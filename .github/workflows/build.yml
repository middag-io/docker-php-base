name: Build and Push PHP Base Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'config/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: middagtec/php-base

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (production)
        id: meta-prod
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.php }}-fpm,enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.php }}-fpm-

      - name: Docker meta (development)
        id: meta-dev
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.php }}-fpm-dev,enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.php }}-fpm-dev-

      - name: Build and push (production)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          build-args: PHP_VERSION=${{ matrix.php }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-prod.outputs.tags }}
          labels: ${{ steps.meta-prod.outputs.labels }}
          cache-from: type=gha,scope=php${{ matrix.php }}-prod
          cache-to: type=gha,mode=max,scope=php${{ matrix.php }}-prod

      - name: Build and push (development)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: development
          build-args: PHP_VERSION=${{ matrix.php }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dev.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels }}
          cache-from: type=gha,scope=php${{ matrix.php }}-dev
          cache-to: type=gha,mode=max,scope=php${{ matrix.php }}-dev

  tag-latest:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag 8.4-fpm as latest
        run: |
          docker pull ${{ env.IMAGE_NAME }}:8.4-fpm
          docker tag ${{ env.IMAGE_NAME }}:8.4-fpm ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest
